name: durable_workflow
description: >-
  Local durable execution library for Dart.
  Provides durable checkpoint/resume workflows with zero dependencies.
version: 0.2.0
repository: https://github.com/brody-0125/durable_workflow/tree/main/durable_workflow
issue_tracker: https://github.com/brody-0125/durable_workflow/issues
topics:
  - workflow
  - durable-execution
  - checkpoint
  - saga
  - retry

environment:
  sdk: ^3.4.0

dependencies:
  test: ^1.25.0

dev_dependencies:
  fake_async: ^1.3.0
  lints: ^4.0.0
  durable_workflow_sqlite:
    path: ../durable_workflow_sqlite
