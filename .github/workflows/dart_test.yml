name: Dart Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        package:
          - durable_workflow
          - durable_workflow_sqlite
          - durable_workflow_drift
        sdk:
          - stable
          - beta

    defaults:
      run:
        working-directory: ${{ matrix.package }}

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: ${{ matrix.sdk }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Install dependencies
        run: dart pub get

      - name: Run build_runner (drift only)
        if: matrix.package == 'durable_workflow_drift'
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check outdated dependencies
        if: matrix.sdk == 'stable'
        run: dart pub outdated
        continue-on-error: true

      - name: Analyze
        run: dart analyze --fatal-warnings

      - name: Run tests with coverage
        run: dart test --coverage=coverage

      - name: Convert coverage to LCOV
        if: matrix.sdk == 'stable'
        run: |
          dart pub global activate coverage
          dart pub global run coverage:format_coverage \
            --lcov --in=coverage --out=coverage/lcov.info \
            --report-on=lib

      - name: Upload coverage artifact
        if: matrix.sdk == 'stable'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.package }}
          path: ${{ matrix.package }}/coverage/lcov.info

  test-flutter:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        sdk:
          - stable
          - beta

    defaults:
      run:
        working-directory: durable_workflow_flutter

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: ${{ matrix.sdk }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-warnings
        continue-on-error: true

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage artifact
        if: matrix.sdk == 'stable'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-durable_workflow_flutter
          path: durable_workflow_flutter/coverage/lcov.info

  coverage-report:
    runs-on: ubuntu-latest
    needs: [test, test-flutter]
    if: github.event_name == 'pull_request'

    strategy:
      matrix:
        package:
          - durable_workflow
          - durable_workflow_sqlite
          - durable_workflow_drift

    steps:
      - uses: actions/checkout@v4

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-${{ matrix.package }}
          path: coverage-artifacts

      - name: Report coverage
        uses: zgosalvez/github-actions-report-lcov@v4
        with:
          coverage-files: coverage-artifacts/lcov.info
          minimum-coverage: 80
          artifact-name: coverage-report-${{ matrix.package }}
        continue-on-error: true
