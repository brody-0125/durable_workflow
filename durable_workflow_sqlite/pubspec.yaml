  Uses sqlite3 FFI for high-performance local persistence.
version: 0.1.0
repository: https://github.com/brody-0125/durable_workflow/tree/main/durable_workflow_sqlite
issue_tracker: https://github.com/brody-0125/durable_workflow/issues
topics:
  - workflow
  - sqlite
  - persistence
  - checkpoint

environment:
  sdk: ^3.4.0

dependencies:
  durable_workflow: ^0.1.0
  meta: ^1.11.0
  sqlite3: ^2.4.0

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
